<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tải File Quà Tặng</title>
<style>
  :root{
    --pink:#e93d82;
    --pink-light:#ff92ad;
    --bg-deep:#170a13;
    --bg-card:#241220;
    --border:#3d1f34;
    --text:#fbe8f0;
    --text-dim:#c99aab;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    background:radial-gradient(circle at 20% 0%,#3a0f2a 0%,transparent 45%),
      radial-gradient(circle at 90% 30%,#2a0f22 0%,transparent 40%),var(--bg-deep);
    color:var(--text);font-family:"Segoe UI","Helvetica Neue",Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .box{max-width:420px;width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:28px 24px;text-align:center;}
  h1{font-size:1.2rem;margin:0 0 10px;color:var(--pink-light);}
  p{font-size:.88rem;line-height:1.6;color:var(--text-dim);margin:0 0 20px;}
  button, a.btn{
    display:inline-block;width:100%;padding:14px;border:none;border-radius:12px;
    background:linear-gradient(135deg,#ff6fa5,#e93d82);color:#fff;font-weight:800;
    font-size:.95rem;cursor:pointer;text-decoration:none;box-shadow:0 6px 20px rgba(233,61,130,.4);
  }
  a.home{display:block;margin-top:16px;color:var(--text-dim);font-size:.8rem;text-decoration:none;}
  .icon{font-size:2.6rem;margin-bottom:10px;}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="icon">⏳</div>
  <h1>Đang kiểm tra...</h1>
  <p>Vui lòng đợi một chút.</p>
</div>

<script>
(function(){
  const box = document.getElementById("box");
  const TOKEN_EXPIRY_MIN = 20; // phải khớp với settings.json / admin.html

  function showError(msg){
    box.innerHTML = `
      <div class="icon">⚠️</div>
      <h1>Không thể tải file</h1>
      <p>${msg}</p>
      <a class="btn" href="index.html">Quay lại chọn mẫu</a>
    `;
  }

  let raw;
  try {
    raw = localStorage.getItem("pending_gift");
  } catch (e) {
    showError("Trình duyệt chặn bộ nhớ tạm (localStorage). Hãy thử trình duyệt khác.");
    return;
  }

  if (!raw) {
    showError("Không tìm thấy file nào đang chờ tải. Bạn cần tạo mẫu quà tặng và vượt link từ trang admin trước, trên đúng trình duyệt/thiết bị này.");
    return;
  }

  let payload;
  try {
    payload = JSON.parse(raw);
  } catch (e) {
    showError("Dữ liệu file bị lỗi. Hãy quay lại tạo mẫu lần nữa.");
    return;
  }

  const ageMin = (Date.now() - (payload.createdAt || 0)) / 60000;
  if (ageMin > TOKEN_EXPIRY_MIN) {
    localStorage.removeItem("pending_gift");
    showError("Link đã hết hạn (quá " + TOKEN_EXPIRY_MIN + " phút kể từ lúc tạo). Hãy quay lại trang admin để tạo và vượt link lại.");
    return;
  }

  box.innerHTML = `
    <div class="icon">🎁</div>
    <h1>File của bạn đã sẵn sàng!</h1>
    <p>Bấm nút bên dưới để tải file .html hoàn chỉnh về máy.</p>
    <button id="downloadBtn">⬇️ Tải xuống ngay</button>
    <a class="home" href="index.html">Về trang chọn mẫu</a>
  `;

  document.getElementById("downloadBtn").addEventListener("click", () => {
    const blob = new Blob([payload.content], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = payload.filename || "qua-tang.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    localStorage.removeItem("pending_gift");
    document.getElementById("box").innerHTML = `
      <div class="icon">✅</div>
      <h1>Đã tải xong!</h1>
      <p>Nếu muốn tạo thêm mẫu khác, quay lại trang chọn mẫu nhé.</p>
      <a class="btn" href="index.html">Về trang chọn mẫu</a>
    `;
  });
})();
</script>
</body>
</html>
